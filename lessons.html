<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Club - Quản lý giáo án</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo"><i class="bi bi-calculator-fill"></i> Math Club</div>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
        <a href="members.html" class="nav-link"><i class="bi bi-people-fill"></i> Thành viên</a>
        <a href="lessons.html" class="nav-link active"><i class="bi bi-journal-text"></i> Giáo án</a>
        <a href="meetings.html" class="nav-link"><i class="bi bi-calendar-event-fill"></i> Cuộc họp</a>
        <a class="nav-link" href="#" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between align-items-start mb-5">
            <div>
                <h2>Quản lý giáo án</h2>
                <p class="text-secondary">CRUD giáo án CLB Toán</p>
            </div>

            <button class="btn btn-main-small" data-bs-toggle="modal" data-bs-target="#lessonModal" id="btnAddLesson"><i class="bi bi-plus-circle"></i> Thêm giáo án</button>
        </div>

        <div class="card-dark p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0">Danh sách giáo án</h5>
                <input type="text" class="form-control search-box" placeholder="Tìm kiếm..."  id="searchBox" style="max-width:380px;">
            </div>

            <div class="table-responsive">

                <table class="table table-dark table-hover table-bordered table-striped align-middle">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên bài học</th>
                            <th>Chủ đề</th>
                            <th>Giảng viên</th>
                            <th>Ngày học</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>

                    <tbody id="lessonTableBody">
                        <!-- Dữ liệu firebase -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="lessonModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm giáo án</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
            
                <div class="modal-body">
                    <!-- Thêm một input ẩn để lưu ID khi cập nhật bài học -->
                    <input type="hidden" id="lessonId"> 
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tên bài học</label>
                            <input type="text" id="lessonName" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Chủ đề</label>
                            <select id="lessonTopic" class="form-control">
                                <option>Đại số</option>
                                <option>Hình học</option>
                                <option>Số học</option>
                                <option>Tổ hợp</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Giảng viên</label>
                            <input type="text" id="lessonTeacher" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày học</label>
                            <input type="date" id="lessonDate" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Nội dung</label>
                            <textarea id="lessonContent" class="form-control" rows="5"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Nút Hủy/Lưu -->
                <div class="modal-footer border-secondary">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary" id="btnSaveLesson">Lưu</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../base/lessons.js"></script>
    <script type="module" src="../base/global.js"></script>
</body>
</html>
