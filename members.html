<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Club - Quản lý thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo"><i class="bi bi-calculator-fill"></i> Math Club</div>

        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a class="nav-link active" href="members.html"><i class="bi bi-people-fill"></i> Thành viên</a>
            <a class="nav-link" href="lessons.html"><i class="bi bi-journal-bookmark-fill"></i> Giáo án</a>
            <a class="nav-link" href="meetings.html"><i class="bi bi-calendar-event-fill"></i> Cuộc họp</a>
            <a class="nav-link" href="#" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
        </nav>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- Header -->
        <div class="header">
            <div>
                <h2>Quản lý thành viên</h2>
                <p class="text-secondary">
                    CRUD thành viên CLB Toán
                </p>
            </div>

            <!-- Nút mở modal thêm mới (Đặt id là btnAddMember để reset form khi nhấn vào) -->
            <button class="btn btn-main-small" id="btnAddMember" data-bs-toggle="modal" data-bs-target="#memberModal">
                <i class="bi bi-plus-circle"></i> Thêm thành viên
            </button>
        </div>

        <!-- Table -->
        <div class="card-dark p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="section-title mb-0">Danh sách thành viên</h5>
                <!-- Ô tìm kiếm realtime -->
                <input type="text" id="searchBox" class="form-control search-box w-25" placeholder="Tìm kiếm...">
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>STT</th>
                            <th>Họ tên</th>
                            <th>Lớp</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th width="170">Thao tác</th>
                        </tr>
                    </thead>

                    <!-- Gán ID cho tbody để render danh sách từ Firebase -->
                    <tbody id="memberTableBody">
                        <!-- Dữ liệu sẽ được load realtime ở đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal CRUD -->
    <div class="modal fade" id="memberModal">
        <div class="modal-dialog">
            <div class="modal-content" style="background:#1e293b;color:white;">

                <div class="modal-header border-secondary">
                    <!-- ID tiêu đề modal để thay đổi linh hoạt giữa "Thêm" và "Cập nhật" -->
                    <h5 class="modal-title" id="memberModalLabel">Thêm thành viên</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                
                <div class="modal-body">
                    <!-- Input ẩn chứa ID thành viên khi sửa đổi -->
                    <input type="hidden" id="memberId">

                    <div class="mb-3">
                        <label>Họ tên</label>
                        <input type="text" id="memberName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Lớp</label>
                        <input type="text" id="memberClass" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="memberEmail" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Vai trò</label>
                        <select id="memberRole" class="form-control">
                            <option value="Thành viên">Thành viên</option>
                            <option value="Ban điều hành">Ban điều hành</option>
                            <option value="Khách">Khách</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer border-secondary">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <!-- ID nút lưu để gán sự kiện click gửi lên Firestore -->
                    <button class="btn btn-primary" id="btnSaveMember">Lưu</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../base/members.js"></script>
    <script type="module" src="../base/global.js"></script>
</body>
</html>
