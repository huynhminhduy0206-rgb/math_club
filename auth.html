<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Club - Đăng Nhập/Đăng Ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">
    <div class="left-panel">
        <div class="hero">
            <h1>Math Club</h1>
            <p>Hệ thống quản lý CLB & Nhóm học tập Toán</p>

            <div class="formula">
                <h5>Pythagoras</h5>
                <div>a² + b² = c²</div>
            </div>

            <div class="formula">
                <h5>Euler</h5>
                <div>e<sup>iπ</sup> + 1 = 0</div>
            </div>

            <div class="formula">
                <h5>Quadratic Formula</h5>
                <div>x = [-b ± √(b² - 4ac)] : (2a)</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="auth-card">

            <form id="loginForm" onsubmit="return false;">
                <h2>Đăng nhập</h2>
                <p>Truy cập website CLB</p>

                <div class="mb-3">
                    <label style="color: #94a3b8;">Email</label>
                    <input type="email" placeholder="Nhập email của bạn..." id="loginEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label style="color: #94a3b8;">Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu của bạn..." id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-main">Đăng nhập</button>
                <div class="switch-text">
                    Chưa có tài khoản?
                    <a id="toRegisterBtn" style="cursor: pointer;">Đăng ký</a>
                </div>
            </form>

            <form id="registerForm" style="display: none;" onsubmit="return false;">
                <h2>Đăng ký</h2>
                <p>Tạo tài khoản mới</p>

                <div class="mb-3">
                    <label style="color: #94a3b8;">Họ và tên</label>
                    <input type="text" placeholder="Nhập họ và tên của bạn..." id="registerName" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label style="color: #94a3b8;">Lớp</label>
                    <input type="text" placeholder="Nhập lớp hiện tại của bạn..." id="registerClass" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label style="color: #94a3b8;">Email</label>
                    <input type="email" placeholder="Nhập email của bạn..." id="registerEmail" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label style="color: #94a3b8;">Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu của bạn..." id="registerPassword" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-main">Đăng ký</button>

                <div class="switch-text">
                    Đã có tài khoản?
                    <a id="toLoginBtn" style="cursor: pointer;">Đăng nhập</a>
                </div>
            </form>

        </div>
    </div>

    <script type="module" src="../base/auth.js"></script>
</body>
</html>
